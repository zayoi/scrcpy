name: Build scrcpy (Win64 + Android Server)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-server:
    name: Build Android Server (scrcpy-server.jar)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Server JAR
        run: |
          # 使用官方脚本构建 server
          ./release/build_server.sh

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-server
          path: |
            build-server/scrcpy-server.jar
          retention-days: 7

  build-win64:
    name: Build Windows 64-bit Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Win64 Client
        run: |
          # 调用官方脚本进行 MinGW 交叉编译
          bash ./release/build_windows.sh 64

      - name: Upload Win64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-win64
          path: |
            build-win64/dist/
            build-win64/scrcpy.exe
          retention-days: 7
